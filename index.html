<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');

  :root{
    --bg: #f3f5f4;
    --panel: #ffffff;
    --ink: #11231b;
    --ink-soft: #4d5d56;
    --muted: #8b968f;
    --line: #e3e8e5;
    --pitch: #0d2b1f;
    --pitch-2: #163f2c;
    --gold: #d8a13c;
    --gold-soft: #f4e6c8;
    --green-ok: #1e8a4c;
    --green-bg: #e7f5ec;
    --red: #c0392b;
    --red-bg: #fbeae8;
    --radius: 12px;
    --shadow: 0 2px 10px rgba(13,43,31,.06);
  }
  *{ box-sizing: border-box; }
  #app{
    font-family: 'Manrope', -apple-system, "Segoe UI", Arial, sans-serif;
    display: flex;
    background: var(--bg);
    color: var(--ink);
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid var(--line);
    max-width: 1040px;
    margin: 0 auto;
    min-height: 600px;
  }
  .sidebar{
    width: 220px; flex-shrink: 0;
    background: var(--pitch);
    color: #fff;
    display: flex; flex-direction: column;
    padding: 22px 14px;
  }
  .sidebar-top{ padding: 0 8px 22px; border-bottom: 1px solid rgba(255,255,255,.1); margin-bottom: 16px; }
  .logo{ display: flex; align-items: center; gap: 10px; }
  .logo-mark{
    width: 34px; height: 34px; border-radius: 9px; background: var(--gold);
    color: var(--pitch); font-weight: 800; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-text{ display: flex; flex-direction: column; line-height: 1.25; }
  .logo-text strong{ font-size: 14px; font-weight: 700; }
  .logo-text span{ font-size: 11px; color: var(--gold); font-weight: 600; }
  .nav{ display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .nav-btn{
    text-align: left; border: none; background: transparent; color: rgba(255,255,255,.65);
    padding: 10px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 10px; transition: background .15s, color .15s;
  }
  .nav-btn .dot{ width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .5; }
  .nav-btn:hover{ background: rgba(255,255,255,.06); color: #fff; }
  .nav-btn.active{ background: rgba(216,161,60,.16); color: var(--gold); }
  .nav-btn.active .dot{ background: var(--gold); opacity: 1; animation: dot-pulse 1.4s ease-in-out infinite; }
  @keyframes dot-pulse{
    0%, 100% { box-shadow: 0 0 0 0 rgba(216,161,60,.5); }
    50% { box-shadow: 0 0 0 4px rgba(216,161,60,0); }
  }
  .sidebar-bottom{ padding-top: 14px; border-top: 1px solid rgba(255,255,255,.1); }
  .mini-stat{ font-size: 11px; color: rgba(255,255,255,.55); line-height: 1.6; }
  .mini-stat strong{ color: #fff; font-size: 13px; display: block; margin-bottom: 2px; }

  .main{ flex: 1; min-width: 0; background: var(--bg); }
  .hero{ position: relative; height: 150px; overflow: hidden; }
  .hero-img{ width: 100%; height: 100%; object-fit: cover; object-position: center 30%; display: block; filter: saturate(1.05); }
  .hero-overlay{
    position: absolute; inset: 0; background: linear-gradient(100deg, rgba(13,43,31,.92) 0%, rgba(13,43,31,.55) 45%, rgba(13,43,31,.05) 80%);
    display: flex; flex-direction: column; justify-content: center; padding: 0 28px; color: #fff;
  }
  .hero-tag{
    align-self: flex-start; background: var(--gold); color: var(--pitch); font-size: 10px; font-weight: 800;
    text-transform: uppercase; letter-spacing: .6px; padding: 3px 10px; border-radius: 20px; margin-bottom: 8px;
  }
  .hero-overlay h1{ font-size: 22px; font-weight: 800; margin: 0 0 4px; }
  .hero-overlay p{ font-size: 12.5px; margin: 0; color: rgba(255,255,255,.8); font-weight: 500; }
  .hero-corner{
    position: absolute; right: 18px; bottom: -14px; width: 76px; height: 76px; object-fit: cover;
    border-radius: 10px; border: 3px solid #fff; box-shadow: 0 4px 14px rgba(0,0,0,.3);
  }

  main{ padding: 26px 28px 32px; }
  .card{
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 20px 22px; margin-bottom: 18px; box-shadow: var(--shadow);
    animation: card-kickoff .4s cubic-bezier(.22,1,.36,1) backwards;
  }
  .card:nth-of-type(1){ animation-delay: 0s; }
  .card:nth-of-type(2){ animation-delay: .06s; }
  .card:nth-of-type(3){ animation-delay: .12s; }
  .card:nth-of-type(4){ animation-delay: .18s; }
  @keyframes card-kickoff{
    0%   { opacity: 0; transform: translateY(14px) scale(.98); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  .trophy-card{
    background: linear-gradient(135deg, var(--pitch), var(--pitch-2));
    border: 1px solid var(--gold); color: #fff;
  }
  .trophy-card h2 span{ color: #fff; }
  .card h2{
    font-size: 14px; margin: 0 0 16px; color: var(--ink); font-weight: 800;
    display: flex; align-items: center; justify-content: space-between;
  }
  .card h2 small{ font-size: 11px; font-weight: 600; color: var(--muted); }

  table{ width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td{ padding: 10px 8px; text-align: center; }
  thead th{
    color: var(--muted); font-weight: 700; font-size: 10.5px; text-transform: uppercase;
    letter-spacing: .5px; border-bottom: 1.5px solid var(--line); text-align: center;
  }
  thead th:first-child, thead th.left{ text-align: left; }
  tbody tr{ border-bottom: 1px solid var(--line); }
  tbody tr:last-child{ border-bottom: none; }
  tbody tr:hover{ background: rgba(13,43,31,.025); }
  td.name{ text-align: left; font-weight: 700; color: var(--ink); }
  td.rank{ font-weight: 800; color: var(--muted); width: 26px; }
  tr.rank-1 td.rank, tr.rank-2 td.rank, tr.rank-3 td.rank{ color: var(--green-ok); }
  .pts{ font-weight: 800; color: var(--pitch); }

  input[type=text], input[type=number], select{
    padding: 9px 12px; border: 1px solid var(--line); border-radius: 8px; font-size: 13px;
    background: #fafbfa; font-family: inherit; color: var(--ink); transition: border-color .15s, box-shadow .15s;
  }
  input[type=text]:focus, input[type=number]:focus, select:focus{
    outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(216,161,60,.15);
  }
  input[type=number]{ width: 58px; text-align: center; font-weight: 800; }
  select{ cursor: pointer; }

  button.action{
    background: var(--pitch); color: #fff; border: none; padding: 10px 18px;
    border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 700; font-family: inherit;
    transition: transform .15s cubic-bezier(.34,1.56,.64,1), background .15s;
  }
  button.action:hover{ background: var(--pitch-2); transform: translateY(-2px) rotate(-1.5deg); }
  button.action:active{ transform: scale(.94) rotate(2deg); }
  button.danger{ background: transparent; color: var(--red); border: 1px solid rgba(192,57,43,.3); }
  button.danger:hover{ background: var(--red-bg); }
  button.small{ padding: 6px 11px; font-size: 11.5px; }
  button.gold{ background: var(--gold); color: var(--pitch); }
  button.gold:hover{ background: #c79330; }

  .match-row{ display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .match-row select{ flex: 1; min-width: 130px; }
  .vs{ font-size: 11px; color: var(--muted); font-weight: 800; letter-spacing: .5px; text-transform: uppercase; }
  .empty{ color: var(--muted); font-size: 13px; padding: 24px 0; text-align: center; }
  .field-row{ display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }

  .pill{ display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 800; letter-spacing: .3px; text-transform: uppercase; margin-left: 8px; }
  .pill.qual{ background: var(--green-bg); color: var(--green-ok); }
  .pill.done{ background: var(--green-bg); color: var(--green-ok); }
  .pill.upcoming{ background: var(--gold-soft); color: var(--gold); }
  .pill.tbd{ background: var(--bg); color: var(--muted); }

  .fixture-list{ display: flex; flex-direction: column; gap: 10px; }
  .fixture-row{ background: var(--bg); border-radius: 10px; padding: 14px 16px; }
  .fixture-meta{ display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .fixture-label{ font-size: 12.5px; font-weight: 800; color: var(--ink); }
  .fixture-date{ font-size: 12px; padding: 5px 8px; border: 1px solid var(--line); border-radius: 6px; background: var(--panel); font-family: inherit; color: var(--ink-soft); margin-left: auto; }
  .fixture-body{ display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .fixture-player{ flex: 2; min-width: 120px; }
  .fixture-score{ width: 50px; }
  .leg-row{ display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .leg-tag{ font-size: 10.5px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; width: 80px; flex-shrink: 0; }
  .agg-row{
    display: flex; align-items: center; gap: 10px; margin-top: 10px; padding-top: 10px;
    border-top: 1px dashed var(--line); font-size: 12px; color: var(--ink-soft); font-weight: 700;
  }
  .agg-score{ font-weight: 800; color: var(--ink); }
  .agg-score.agg-win{ color: var(--green-ok); }

  .chat-list{ display: flex; flex-direction: column; gap: 10px; max-height: 480px; overflow-y: auto; }
  .chat-msg{ background: var(--bg); border-radius: 10px; padding: 10px 14px; }
  .chat-msg-head{ display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .chat-msg-head strong{ font-size: 13px; color: var(--pitch); }
  .chat-msg-time{ font-size: 10.5px; color: var(--muted); font-weight: 600; }
  .chat-msg-body{ font-size: 13px; color: var(--ink); line-height: 1.5; word-break: break-word; }

  .contact-box{

<script>
(function(){
  // === Configuration Supabase ===
  // Remplace ces deux valeurs par celles de TON projet Supabase
  // (Project Settings > API dans ton tableau de bord Supabase)
  const SUPABASE_URL = 'https://nayvqaqbgunhqldcvzxe.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_8JQV3ZQrUzMHiguPL-xgwg_thSr1PrR';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const TOURNOI_ROW_ID = 1; // identifiant fixe de la ligne unique qui contient tout l'état du tournoi
  function GROUPS_LETTERS(n){
    const letters = [];
    for(let i=0;i<n;i++){ letters.push(String.fromCharCode(65+i)); }
    return letters;
  }
  function getGroups(){
    return GROUPS_LETTERS(state.groupCount || 4);
  }
  let state = { players: [], matches: [], bracket: {}, chat: [], groupCount: 4, tournamentStarted: false };
  let activeTab = "joueurs";
  let isAdmin = false;

  const view = document.getElementById('view');
  const tabsEl = document.getElementById('tabs');
  const toastEl = document.getElementById('toast');
  const miniStatEl = document.getElementById('miniStat');

  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastEl._t);
    toastEl._t = setTimeout(()=> toastEl.classList.remove('show'), 1600);
  }

  function getTabs(){
    const base = [{id:"joueurs", label:"Joueurs"}];
    if(state.tournamentStarted){
      base.push({id:"matchs", label:"Nouveau match"});
      base.push(...getGroups().map(g=>({id:"poule-"+g, label:"Poule "+g})));
      base.push({id:"finale", label:"Phase finale"});
      base.push({id:"buteurs", label:"Buteurs"});
    }
    base.push({id:"reglement", label:"Règlement"});
    base.push({id:"chat", label:"Discussion"});
    base.push({id:"contact", label:"Nous contacter"});
    base.push({id:"admin", label:"Administrateur"});
    return base;
  }

  function renderTabs(){
    const TABS = getTabs();
    tabsEl.innerHTML = TABS.map(t=>
      `<button class="nav-btn ${t.id===activeTab?'active':''}" data-tab="${t.id}"><span class="dot"></span>${t.label}</button>`
    ).join('');
    tabsEl.querySelectorAll('button').forEach(b=>{
      b.onclick = ()=>{ activeTab = b.dataset.tab; renderTabs(); renderView(); };
    });
  }

  function renderMiniStat(){
    const totalMatches = state.matches.length;
    miniStatEl.innerHTML = `<strong>${state.players.length} joueurs</strong>${totalMatches} match${totalMatches===1?'':'s'} joué${totalMatches===1?'':'s'}`;
    renderHeroSubtitle();
  }

  function renderHeroSubtitle(){
    const heroEl = document.getElementById('heroSubtitle');
    if(!heroEl) return;
    const nbPlayers = state.players.length;
    const nbGroups = getGroups().length;
    heroEl.textContent = `${nbPlayers} joueur${nbPlayers===1?'':'s'} · ${nbGroups} poule${nbGroups===1?'':'s'} · phase finale à élimination directe`;
  }

  async function save(msg){
    try{
      const { error } = await supabase
        .from('tournoi_state')
        .upsert({ id: TOURNOI_ROW_ID, data: state, updated_at: new Date().toISOString() });
      if(error) throw error;
      if(msg) showToast(msg);
    }catch(e){
      console.error('save failed', e);
      showToast('⚠️ Échec de la sauvegarde en ligne — vérifie ta connexion internet.');
    }
    renderMiniStat();
  }

  async function load(){
    try{
      const { data: row, error } = await supabase
        .from('tournoi_state')
        .select('data')
        .eq('id', TOURNOI_ROW_ID)
        .maybeSingle();
      if(error) throw error;
      if(row && row.data){ state = row.data; }
      else { state.players = []; await save(); }
    }catch(e){
      console.error('load failed', e);
      state.players = [];
    }
    if(!state.chat) state.chat = [];
    if(!state.bracket) state.bracket = {};
  }

  // Met à jour l'affichage automatiquement chez TOUS les utilisateurs
  // dès qu'une donnée change côté serveur (inscriptions, scores, chat...)
  function subscribeToLiveUpdates(){
    supabase
      .channel('tournoi-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'tournoi_state', filter: `id=eq.${TOURNOI_ROW_ID}` }, (payload)=>{
        if(payload.new && payload.new.data){
          state = payload.new.data;
          if(!state.chat) state.chat = [];
          if(!state.bracket) state.bracket = {};
          renderTabs();
          renderMiniStat();
          renderView();
        }
      })
      .subscribe();
  }

  async function getMyName(){
    try{
      return localStorage.getItem('mon-pseudo') || '';
    }catch(e){ return ''; }
  }
  async function setMyName(name){
    try{ localStorage.setItem('mon-pseudo', name); }catch(e){}
  }

  function getMyDeviceId(){
    try{
      let id = localStorage.getItem('mon-device-id');
      if(!id){
        id = 'd' + Date.now() + Math.random().toString(36).slice(2,10);
        localStorage.setItem('mon-device-id', id);
      }
      return id;
    }catch(e){ return null; }
  }

  // Le joueur correspondant à cet appareil (celui qui s'est inscrit lui-même depuis ce navigateur)
  function myPlayer(){
    const myId = getMyDeviceId();
    return state.players.find(p=>p.ownerId === myId) || null;
  }

  // Seul l'administrateur ou le joueur lui-même peut modifier/supprimer sa propre fiche
  function canManagePlayer(p){
    if(isAdmin) return true;
    const me = myPlayer();
    return !!me && me.id === p.id;
  }

  // Seul l'administrateur ou l'un des deux joueurs concernés par ce match peut saisir/modifier son score
  function canEditMatch(m){
    if(isAdmin) return true;
    const me = myPlayer();
    if(!me) return false;
    return me.id === m.p1 || me.id === m.p2;
  }

  // Pour la phase finale, le bracket stocke des noms (et non des id) : on résout par nom
  function canEditBracketMatch(m){
    if(isAdmin) return true;
    const me = myPlayer();
    if(!me) return false;
    return (m.p1 && m.p1 === me.name) || (m.p2 && m.p2 === me.name);
  }

  function playersOf(group){ return state.players.filter(p=>p.group===group); }

  function topScorers(){
    const goals = {};
    state.players.forEach(p=> goals[p.id] = 0);
    state.matches.forEach(m=>{
      if(m.s1!=='' && m.s1!=null && goals[m.p1]!=null) goals[m.p1] += parseInt(m.s1)||0;
      if(m.s2!=='' && m.s2!=null && goals[m.p2]!=null) goals[m.p2] += parseInt(m.s2)||0;
    });
    Object.values(state.bracket||{}).forEach(m=>{
      if(!m.p1 || !m.p2) return;
      const p1 = state.players.find(p=>p.name===m.p1 || p.id===m.p1);
      const p2 = state.players.find(p=>p.name===m.p2 || p.id===m.p2);
      const addGoal = (player, val)=>{ if(player && goals[player.id]!=null && val!=='' && val!=null) goals[player.id] += parseInt(val)||0; };
      if(m.s1!=null) { addGoal(p1, m.s1); addGoal(p2, m.s2); }
      if(m.a1!=null) { addGoal(p1, m.a1); addGoal(p2, m.a2); }
      if(m.b1!=null) { addGoal(p2, m.b1); addGoal(p1, m.b2); }
      // Buts de prolongation comptabilisés ; les tirs au but (tb1/tb2) ne le sont jamais.
      if(m.ep1!=null) { addGoal(p1, m.ep1); addGoal(p2, m.ep2); }
    });
    return state.players.map(p=>({id:p.id, name:p.name, photo:p.photo, goals: goals[p.id]||0}))
      .sort((a,b)=> b.goals - a.goals);
  }

  function nextMatches(limit){
    const pend = state.matches.filter(m=> m.s1==='' || m.s2==='' || m.s1==null || m.s2==null);
    return pend.slice(0, limit||4);
  }

  function standings(group){
    const ps = playersOf(group);
    const table = {};
    ps.forEach(p=> table[p.id] = {id:p.id, name:p.name, photo:p.photo, J:0,V:0,N:0,D:0,BP:0,BC:0,Pts:0});
    const groupMatches = state.matches.filter(m=>m.group===group);
    groupMatches.forEach(m=>{
      if(m.s1==='' || m.s2==='' || m.s1==null || m.s2==null) return;
      const s1 = parseInt(m.s1), s2 = parseInt(m.s2);
      const a = table[m.p1], b = table[m.p2];
      if(!a || !b) return;
      a.J++; b.J++;
      a.BP += s1; a.BC += s2;
      b.BP += s2; b.BC += s1;
      if(s1>s2){ a.V++; a.Pts+=3; b.D++; }
      else if(s1<s2){ b.V++; b.Pts+=3; a.D++; }
      else { a.N++; b.N++; a.Pts++; b.Pts++; }
    });
    // Confrontation directe : points obtenus par idA contre idB lors de leur match de poule (3/1/0)
    function headToHeadPoints(idA, idB){
      const m = groupMatches.find(mm => (mm.p1===idA && mm.p2===idB) || (mm.p1===idB && mm.p2===idA));
      if(!m || m.s1==='' || m.s2==='' || m.s1==null || m.s2==null) return 0;
      const s1 = parseInt(m.s1), s2 = parseInt(m.s2);
      const aIsP1 = m.p1===idA;
      const myScore = aIsP1 ? s1 : s2;
      const oppScore = aIsP1 ? s2 : s1;
      if(myScore>oppScore) return 3;
      if(myScore===oppScore) return 1;
      return 0;
    }
    return Object.values(table).sort((x,y)=>
      (y.Pts-x.Pts) ||
      ((y.BP-y.BC)-(x.BP-x.BC)) ||
      (y.BP-x.BP) ||
      (headToHeadPoints(y.id,x.id) - headToHeadPoints(x.id,y.id))
    );
  }

  function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  const AVATAR_COLORS = ['#d8a13c','#1e8a4c','#377abf','#c0392b','#7b5cb8','#1aa3a3'];
  function initials(name){
    return (name||'?').trim().split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase();
  }
  function colorFor(id){
    let h = 0;
    for(let i=0;i<id.length;i++){ h = (h*31 + id.charCodeAt(i)) % AVATAR_COLORS.length; }
    return AVATAR_COLORS[h];
  }
  function avatar(player){
    if(!player) return '<span class="avatar" style="background:#999">?</span>';
    const inner = player.photo
      ? `<img class="avatar" src="${player.photo}" alt="${escapeHtml(player.name)}">`
      : `<span class="avatar" style="background:${colorFor(player.id)}">${initials(player.name)}</span>`;
    // Seul le joueur lui-même (sur son appareil) ou l'administrateur peut changer cette photo.
    if(!canManagePlayer(player)){
      return inner;
    }
    return `<label class="avatar-upload-wrap" title="Changer la photo de ${escapeHtml(player.name)}">
      ${inner}
      <span class="avatar-edit-badge">📷</span>
      <input type="file" accept="image/*" class="avatar-upload-input" data-photo-pid="${player.id}">
    </label>`;
  }

  // Empêche la saisie de scores négatifs ou absurdes (max 30 buts) sur tous les champs de score du site.
  function clampScoreInputs(container){
    (container||document).querySelectorAll('.fixture-score, #mS1, #mS2').forEach(inp=>{
      inp.setAttribute('min', '0');
      inp.setAttribute('max', '30');
      if(inp._clampBound) return;
      inp._clampBound = true;
      inp.addEventListener('input', ()=>{
        if(inp.value === '') return;
        let n = parseInt(inp.value, 10);
        if(isNaN(n) || n < 0) inp.value = '0';
        else if(n > 30) inp.value = '30';
        else if(String(n) !== inp.value) inp.value = String(n); // retire signes/décimales
      });
    });
  }

  function bindAvatarUploads(container){
    (container||document).querySelectorAll('[data-photo-pid]').forEach(inp=>{
      if(inp._bound) return;
      inp._bound = true;
      inp.onchange = async ()=>{
        const file = inp.files[0];
        if(!file) return;
        const p = state.players.find(x=>x.id===inp.dataset.photoPid);
        if(!p) return;
        if(!canManagePlayer(p)){
          showToast("Tu ne peux changer que ta propre photo");
          return;
        }
        try{
          const dataUrl = await compressImage(file);
          p.photo = dataUrl;
          await save('Photo mise à jour');
          renderView();
        }catch(e){ showToast('Impossible de charger cette image'); }
      };
    });
  }

  function compressImage(file){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = (e)=>{
        const img = new Image();
        img.onload = ()=>{
          const size = 120;
          const canvas = document.createElement('canvas');
          canvas.width = size; canvas.height = size;
          const ctx = canvas.getContext('2d');
          const scale = Math.max(size/img.width, size/img.height);
          const w = img.width*scale, h = img.height*scale;
          ctx.drawImage(img, (size-w)/2, (size-h)/2, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.8));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function compressScreenshot(file){
    return new Promise((resolve, reject)=>{
      if(!file || !file.type || !file.type.startsWith('image/')){
        reject(new Error('not_an_image'));
        return;
      }
      const reader = new FileReader();
      reader.onload = (e)=>{
        const img = new Image();
        img.onload = ()=>{
          try{
            const maxW = 640;
            const scale = Math.min(1, maxW/img.width);
            const w = Math.max(1, Math.round(img.width*scale));
            const h = Math.max(1, Math.round(img.height*scale));
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            if(!ctx) throw new Error('no_canvas_context');
            ctx.drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', 0.75));
          }catch(err){ reject(err); }
        };
        img.onerror = ()=> reject(new Error('image_decode_failed'));
        img.src = e.target.result;
      };
      reader.onerror = ()=> reject(new Error('file_read_failed'));
      reader.readAsDataURL(file);
    });
  }

  const STAT_FIELDS = [
    {key:'possession', label:'Possession', unit:'%'},
    {key:'tirs', label:'Tirs'},

      </div>

        m[inp.dataset.side] = inp.value;

    view.querySelectorAll('[data-delmatch]').forEach(btn=>{

        }
        state.matches = state.matches.filter(x=>x.id!==btn.dataset.delmatch);
        await save('Match annulé'); renderPoule(group);
      };
    });
    view.querySelectorAll('[data-detail]').forEach(btn=>{
      btn.onclick = ()=>{
        const m = state.matches.find(x=>x.id===btn.dataset.detail);
        if(m) openMatchDetailModal(m);
      };
    });
    clampScoreInputs(view);
  }

  function winnerOf(m, twoLegs){
    if(!m) return null;
    if(!twoLegs){
      if(m.s1==='' || m.s2==='' || m.s1==null || m.s2==null) return null;
      const s1 = parseInt(m.s1), s2 = parseInt(m.s2);
      if(isNaN(s1) || isNaN(s2)) return null;
      if(s1!==s2) return s1>s2 ? m.p1 : m.p2;
      // Égalité après 90 min : on regarde la prolongation
      if(m.ep1==='' || m.ep2==='' || m.ep1==null || m.ep2==null) return null;
      const ep1 = parseInt(m.ep1), ep2 = parseInt(m.ep2);
      if(isNaN(ep1) || isNaN(ep2)) return null;
      if(ep1!==ep2) return ep1>ep2 ? m.p1 : m.p2;
      // Toujours égalité après prolongation : on regarde les tirs au but
      if(m.tb1==='' || m.tb2==='' || m.tb1==null || m.tb2==null) return null;
      const tb1 = parseInt(m.tb1), tb2 = parseInt(m.tb2);
      if(isNaN(tb1) || isNaN(tb2) || tb1===tb2) return null;
      return tb1>tb2 ? m.p1 : m.p2;
    } else {
      if(m.a1==='' || m.a2==='' || m.b1==='' || m.b2==='' || m.a1==null || m.a2==null || m.b1==null || m.b2==null) return null;
      const agg1 = parseInt(m.a1) + parseInt(m.b2);
      const agg2 = parseInt(m.a2) + parseInt(m.b1);
      if(isNaN(agg1) || isNaN(agg2)) return null;
      if(agg1!==agg2) return agg1>agg2 ? m.p1 : m.p2;
      // Égalité au score cumulé : on regarde la prolongation (jouée lors du match retour)
      if(m.ep1==='' || m.ep2==='' || m.ep1==null || m.ep2==null) return null;
      const ep1 = parseInt(m.ep1), ep2 = parseInt(m.ep2);
      if(isNaN(ep1) || isNaN(ep2)) return null;
      if(ep1!==ep2) return ep1>ep2 ? m.p1 : m.p2;
      // Toujours égalité après prolongation : on regarde les tirs au but
      if(m.tb1==='' || m.tb2==='' || m.tb1==null || m.tb2==null) return null;
      const tb1 = parseInt(m.tb1), tb2 = parseInt(m.tb2);
      if(isNaN(tb1) || isNaN(tb2) || tb1===tb2) return null;
      return tb1>tb2 ? m.p1 : m.p2;
    }
  }
  function loserOf(m, twoLegs){
    const w = winnerOf(m, twoLegs);
    if(!w || !m) return null;
    return w===m.p1 ? m.p2 : m.p1;
  }

  function ensureBracketSlot(key, defaults){
    if(!state.bracket[key]) state.bracket[key] = Object.assign({}, defaults);
    return state.bracket[key];
  }

  // Remplit automatiquement la phase finale à partir des classements de poule,
  // puis fait avancer les vainqueurs/perdants d'un tour à l'autre.


  // --- Bracket générique basé sur les configurations classiques ---
  // 8 joueurs : 2 poules de 4, top 2 → demies directes
  // 12 joueurs : 3 poules de 4, top 2 + 2 meilleurs 3es → quarts (8)
  // 16 joueurs : 4 poules de 4, top 2 → quarts (8)
  // 24 joueurs : 6 poules de 4, top 2 + 4 meilleurs 3es → huitièmes (16)
  // 32 joueurs : 8 poules de 4, top 2 → huitièmes (16)
  // Se généralise à tout effectif : top 2 de chaque poule qualifiés direct, complété par les
  // meilleurs 3es nécessaires pour atteindre la puissance de 2 supérieure (aucun bye nécessaire).

  function buildSeedOrder(size){
    if(size===1) return [1];
    const prev = buildSeedOrder(size/2);
    const result = [];
    prev.forEach(s=>{ result.push(s); result.push(size+1-s); });
    return result;
  }

  function genericRoundLabel(matchCount){
    if(matchCount===1) return 'Finale';
    if(matchCount===2) return 'Demi-finales';
    if(matchCount===4) return 'Quarts de finale';
    if(matchCount===8) return 'Huitièmes de finale';
    if(matchCount===16) return 'Seizièmes de finale';
    return 'Tour préliminaire ('+matchCount+' matchs)';
  }

  function rankCompare(a,b){
    return (b.Pts-a.Pts) || ((b.BP-b.BC)-(a.BP-a.BC)) || (b.BP-a.BP);
  }

  function nextPow2(n){ let p=1; while(p<n) p*=2; return p; }

  // Détermine la configuration classique active à partir du nombre de poules actuel
  function getClassicConfig(){
    const groups = getGroups();
    const groupCount = groups.length;
    const directCount = groupCount*2; // 2 qualifiés directs par poule
    const target = nextPow2(Math.max(directCount,1));
    const bestThirdsNeeded = Math.max(0, target - directCount);
    return { groups, groupCount, directCount, target, bestThirdsNeeded };
  }

  // Construit et fait avancer un arbre à élimination directe simple (match unique à chaque tour),
  // avec repêchage du 3e place via les deux perdants de demi-finale.
  function syncGenericBracket(){
    const { groups, target, bestThirdsNeeded } = getClassicConfig();
    const groupQuals = groups.map(g => standings(g));

    // Qualifiés directs : tous les 1ers, puis tous les 2es (classés par mérite au sein de leur rang)
    const firsts = groupQuals.map(t=>t[0]).filter(Boolean).sort(rankCompare);
    const seconds = groupQuals.map(t=>t[1]).filter(Boolean).sort(rankCompare);
    // Meilleurs 3es toutes poules confondues, seulement si nécessaire pour compléter la puissance de 2
    const thirds = groupQuals.map(t=>t[2]).filter(Boolean).sort(rankCompare).slice(0, bestThirdsNeeded);

    const seeded = [...firsts, ...seconds, ...thirds];
    const N = seeded.length;
    if(N < 2) return null;

    const bracketSize = target; // toujours une puissance de 2 par construction : aucun bye nécessaire
    const order = buildSeedOrder(bracketSize);
    let roundNames = order.map(seedNum => seedNum<=N ? seeded[seedNum-1].name : null);
    const numRounds = Math.log2(bracketSize);
    const twoLegsEnabled = !!state.finaleTwoLegs;

    const rounds = [];
    for(let r=0; r<numRounds; r++){
      const isFinalRound = (r === numRounds-1);
      const twoLeg = twoLegsEnabled && !isFinalRound; // la finale reste toujours en match unique
      const matchCount = roundNames.length/2;
      const nextRoundNames = [];
      const roundInfo = [];
      for(let i=0;i<matchCount;i++){
        const key = 'gen-r'+r+'-'+i;
        const p1 = roundNames[i*2];
        const p2 = roundNames[i*2+1];
        const slot = ensureBracketSlot(key, twoLeg ? {p1:'', p2:'', a1:'', a2:'', b1:'', b2:''} : {p1:'', p2:'', s1:'', s2:''});
        slot.p1 = p1 || '';
        slot.p2 = p2 || '';
        let winner;
        if(p1 && !p2) winner = p1;       // sécurité (ne devrait pas arriver, plus de byes)
        else if(p2 && !p1) winner = p2;
        else winner = winnerOf(slot, twoLeg);
        nextRoundNames.push(winner || '');
        roundInfo.push(key);
      }
      rounds.push({round:r, matchCount, keys:roundInfo, twoLeg});
      roundNames = nextRoundNames;
    }

    // Petite finale (3e place) à partir des perdants de demi-finale, si elles existent — toujours en match unique
    if(numRounds >= 2){
      const semiRound = numRounds - 2;
      const semiRoundInfo = rounds[semiRound];
      const semiKeys = semiRoundInfo.keys;
      const l1 = loserOf(state.bracket[semiKeys[0]], semiRoundInfo.twoLeg);
      const l2 = loserOf(state.bracket[semiKeys[1]], semiRoundInfo.twoLeg);
      const third = ensureBracketSlot('gen-3rd', {p1:'', p2:'', s1:'', s2:''});
      third.p1 = l1 || ''; third.p2 = l2 || '';
    }

    return { rounds, numRounds, bracketSize, N, hasThird: numRounds>=2, bestThirdsNeeded };
  }


  function avatarByName(name){
    if(!name) return '';
    const p = state.players.find(pl=>pl.name===name);
    return p ? avatar(p) : '';
  }

  const DEFAULT_REGLEMENT = `1. Inscription
Chaque participant s'inscrit lui-même dans l'onglet "Joueurs" en indiquant son pseudo (une photo de profil est facultative). Le pseudo doit être unique : le site refuse toute inscription ou modification vers un pseudo déjà utilisé par un autre joueur. L'administrateur peut fixer un nombre maximum de joueurs ; une fois ce nombre atteint, les inscriptions se ferment automatiquement. Seul le joueur lui-même (depuis l'appareil avec lequel il s'est inscrit) ou l'administrateur peut modifier son pseudo, changer sa photo de profil, ou supprimer son inscription. Une fois le tournoi démarré, plus aucun joueur ne peut se désinscrire lui-même — seul l'administrateur garde ce pouvoir.

2. Démarrage du tournoi
L'administrateur démarre le tournoi en un clic depuis l'espace Administrateur (au moins 4 joueurs inscrits sont nécessaires) : les poules sont tirées au sort aléatoirement entre tous les joueurs inscrits, et le calendrier des confrontations est généré automatiquement. Une fois le tournoi démarré, l'inscription de nouveaux joueurs est bloquée pour les joueurs eux-mêmes. L'administrateur reste libre d'ajouter ou de retirer un joueur à tout moment, y compris en cours de tournoi : un joueur ajouté après le démarrage est automatiquement placé dans la poule la moins remplie, avec un match généré contre chacun de ses adversaires de poule, sans affecter les résultats déjà enregistrés ailleurs.

3. Format des poules
Le tournoi se joue en poules de 4 joueurs. Le nombre de poules est déterminé automatiquement par le nombre total de participants (configurations classiques) : 8 joueurs → 2 poules, 12 joueurs → 3 poules, 16 joueurs → 4 poules, 24 joueurs → 6 poules, 32 joueurs → 8 poules (et toute autre valeur s'arrondit à une poule de 4 la plus proche). Chaque poule se joue en un seul match aller : chaque joueur affronte une seule fois tous les autres de sa poule. Aucune date n'est imposée — chaque match peut être joué dès que les deux joueurs concernés sont prêts.

4. Qualification
Les 2 premiers de chaque poule (classement par points) sont qualifiés directement pour la phase finale. Si ce nombre de qualifiés directs n'est pas un nombre rond pour un tableau à élimination directe, les meilleurs 3es de poule (toutes poules confondues, classés par points puis différence de buts) viennent compléter le tableau — par exemple 2 meilleurs 3es pour 12 joueurs, 4 meilleurs 3es pour 24 joueurs. Avec 8, 16 ou 32 joueurs, aucun 3e n'est nécessaire : les 2 premiers de chaque poule suffisent.

5. Barème de points (phase de poules)
Victoire : 3 points
Match nul : 1 point
Défaite : 0 point
En cas d'égalité de points : différence de buts, puis buts marqués, puis confrontation directe entre les joueurs concernés (résultat de leur match l'un contre l'autre).

6. Phase finale (générée automatiquement)
- Élimination directe à chaque tour (huitièmes, quarts, demi-finales selon le nombre de qualifiés), en match simple ou en aller-retour selon le réglage choisi par l'administrateur.
- Les meilleures têtes de série (1ers de poule, puis 2es, puis meilleurs 3es si besoin) sont réparties dans le tableau pour éviter de s'affronter trop tôt.
- Finale : toujours en match unique, quel que soit le format choisi pour les tours précédents.
- Petite finale (3e place) : toujours en match unique entre les deux perdants de demi-finale.
- Les joueurs de chaque tour se remplissent automatiquement dès que les résultats du tour précédent sont connus — seuls les scores sont à saisir.
- En cas d'égalité après le temps réglementaire (match unique, ou score cumulé en aller-retour) : le site affiche automatiquement un champ "Prolongation" pour départager les deux joueurs. Les buts marqués en prolongation comptent dans le score final et dans le classement des buteurs.
- Si l'égalité persiste après la prolongation, un champ "Tirs au but" apparaît à son tour. Les buts inscrits aux tirs au but ne comptent pas dans le classement des buteurs. Si les tirs au but sont eux aussi à égalité, ils doivent être recommencés jusqu'à obtenir un vainqueur.

7. Conditions de jeu
- Plateforme : Mobile
- Durée des matchs : 10 minutes pour toutes les rencontres (poules et phase finale), sauf la finale qui se joue en 15 minutes.
- Mêmes réglages de match pour tous (niveau de difficulté, météo) à définir avant le début de la compétition.

8. Saisie et preuve des résultats
- Le score d'un match ne peut être saisi, modifié ou annulé que par l'un des deux joueurs concernés (ou par l'administrateur).
- Les scores doivent être compris entre 0 et 30 buts ; le site rejette automatiquement toute valeur négative ou aberrante.
- Il est recommandé de joindre une capture d'écran de l'écran de fin de match comme preuve du résultat.
- Chaque résultat enregistré conserve la trace de qui l'a saisi et à quelle heure.

9. Organisation et suivi
- Chaque joueur peut ajouter sa propre photo de profil dans l'onglet "Joueurs" (cercle cliquable).
- Un classement des buteurs est calculé automatiquement à partir des scores saisis (poules et phase finale confondues).
- Un onglet "Discussion" permet d'échanger entre joueurs ; un onglet "Nous contacter" donne accès à la chaîne et au groupe WhatsApp officiels du tournoi.

10. Espace administrateur
L'administrateur (accès protégé par mot de passe) dispose d'un contrôle total : démarrer ou relancer le tournoi, ajouter ou retirer n'importe quel joueur à tout moment, fixer une limite de joueurs, choisir le format de la phase finale (match simple ou aller-retour), modifier ce règlement, verrouiller les poules pour empêcher toute modification de score, exporter les données du tournoi, et réinitialiser tout ou partie du tournoi si nécessaire. Le nombre de poules n'est pas réglable manuellement : il est calculé automatiquement selon les configurations classiques (poules de 4 joueurs).

11. Fair-play
Tout comportement antisportif (déconnexion volontaire, triche, insultes, fausse déclaration de score) peut entraîner une exclusion du tournoi à la décision de l'organisateur.`;

    function shuffle(arr){
      const a = arr.slice();
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }

    function generateCalendar(){
      const newMatches = [];
      getGroups().forEach(g=>{
        const ps = playersOf(g);
        const pairs = [];
        for(let i=0;i<ps.length;i++){
          for(let j=i+1;j<ps.length;j++){
            pairs.push([ps[i].id, ps[j].id]);
          }
        }
        const shuffledPairs = shuffle(pairs);
        shuffledPairs.forEach(([p1,p2], idx)=>{
          newMatches.push({id:'m'+Date.now()+Math.random().toString(36).slice(2,7)+idx, group:g, p1, p2, s1:'', s2:''});
        });
      });
      state.matches = newMatches;
    }

    document.getElementById('startTournamentBtn').onclick = async ()=>{
      if(state.players.length < 4){
        showToast("Il faut au moins 4 joueurs inscrits pour démarrer le tournoi (poules de 4)");
        return;
      }
      const already = !!state.tournamentStarted;
      const autoGroupCount = Math.max(2, Math.round(state.players.length/4));
      const msg = already
        ? "Le tournoi a déjà démarré. Relancer va REMPLACER les poules, le calendrier et tous les résultats déjà enregistrés. Continuer ?"
        : `Démarrer le tournoi avec ${state.players.length} joueur(s) répartis en ${autoGroupCount} poule${autoGroupCount>1?'s':''} de 4 ? Les poules seront tirées au sort et toutes les confrontations seront générées automatiquement.`;
      if(!(await showConfirm(msg))) return;
      state.groupCount = autoGroupCount;
      const shuffled = shuffle(state.players);
      shuffled.forEach((p, idx)=>{ p.group = getGroups()[idx % getGroups().length]; });
      generateCalendar();
      state.matches = state.matches; // already set by generateCalendar()
      state.bracket = {};
      state.tournamentStarted = true;
      await save(already ? 'Tournoi relancé — nouveau tirage effectué' : '🏁 Tournoi démarré ! Poules et calendrier générés');
      renderTabs();
      renderAdmin();
    };

    document.getElementById('exportBtn').onclick = ()=>{
      const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'tournoi-efootball-2026.json';
      a.click();
      URL.revokeObjectURL(url);
    };
    document.getElementById('clearMatchesBtn').onclick = async ()=>{
      if(!(await showConfirm("Effacer tous les matchs de poule ? Cette action est irréversible — tous les scores de poule déjà saisis seront perdus."))) return;

      state.bracket = {};

    document.getElementById('clearChatBtn').onclick = async ()=>{

    document.getElementById('resetAllBtn').onclick = async ()=>{

      state = { players: [], matches: [], bracket: {}, chat: [], reglement: state.reglement, groupCount: state.groupCount, maxPlayers: state.maxPlayers, finaleTwoLegs: state.finaleTwoLegs, tournamentStarted: false };

  function renderButeurs(){
    const scorers = topScorers().filter(s=>s.goals>0);
    const built = syncGenericBracket();
    const finRound = built ? built.rounds[built.numRounds-1] : null;
    const finMatch = finRound ? state.bracket[finRound.keys[0]] : null;
    const champion = finRound ? winnerOf(finMatch, finRound.twoLeg) : null;
    const topScorer = scorers[0];

    let trophyHtml = '';
    if(champion || topScorer){
      trophyHtml = `<div class="card trophy-card">
        <h2 style="color:#fff"><span>Palmarès</span></h2>
        ${champion ? `<div class="trophy-row"><span class="trophy-icon">🏆</span>${avatarByName(champion)}<div><strong>${escapeHtml(champion)}</strong><span>Champion du tournoi</span></div></div>` : ''}
        ${topScorer ? `<div class="trophy-row"><span class="trophy-icon">⚽</span>${avatar(topScorer)}<div><strong>${escapeHtml(topScorer.name)}</strong><span>Meilleur buteur — ${topScorer.goals} but${topScorer.goals>1?'s':''}</span></div></div>` : ''}
      </div>`;
    }

    const rows = scorers.map((s,i)=>`
      <div class="top-scorer-row">
        <span class="top-scorer-rank">${i+1}</span>
        ${avatar(s)}
        <span>${escapeHtml(s.name)}</span>
        <span class="top-scorer-goals">${s.goals} but${s.goals>1?'s':''}</span>
      </div>`).join('');

    view.innerHTML = `
      ${trophyHtml}
      <div class="card">
        <h2><span>Classement des buteurs</span><small>Toutes compétitions confondues</small></h2>
        ${rows || '<div class="empty">Aucun but inscrit pour le moment</div>'}
      </div>`;
  }

  function renderContact(){
    const waLink = "https://whatsapp.com/channel/0029Vb8QjdT5fM5eUVueOk1c";
    const waGroupLink = "https://chat.whatsapp.com/Dj84R58sAi73UHWLXyhhSS";
    view.innerHTML = `
      <div class="card">
        <h2><span>Nous contacter</span></h2>
        <p style="font-size:13px; color:var(--ink-soft); margin-top:-6px;">
          Reste informé des dernières nouvelles du tournoi, des annonces et du calendrier en suivant notre chaîne WhatsApp.
        </p>
        <div class="contact-box">
          <div class="contact-box-icon">W</div>
          <div class="contact-box-text">
            <strong>TOURNOI EFOOTBALL MOBILE 2026</strong>
            <span>Chaîne officielle WhatsApp</span>
          </div>
          <a href="${waLink}" target="_blank" rel="noopener" class="action gold contact-btn">Suivre la chaîne</a>
        </div>
        <div class="contact-box" style="margin-top:12px;">
          <div class="contact-box-icon">G</div>
          <div class="contact-box-text">
            <strong>Groupe de discussion</strong>
            <span>Échange direct entre joueurs sur WhatsApp</span>
          </div>
          <a href="${waGroupLink}" target="_blank" rel="noopener" class="action gold contact-btn">Rejoindre le groupe</a>
        </div>
      </div>`;
  }

  function renderView(){
    if(!getTabs().some(t=>t.id===activeTab)) activeTab = 'joueurs';
    if(activeTab==='joueurs') renderJoueurs();
    else if(activeTab==='matchs') renderAjoutMatch();
    else if(activeTab==='finale') renderFinale();
    else if(activeTab==='buteurs') renderButeurs();
    else if(activeTab==='reglement') renderReglement();
    else if(activeTab==='chat') renderChat();
    else if(activeTab==='contact') renderContact();
    else if(activeTab==='admin') renderAdmin();
    else {
      const g = activeTab.split('-')[1];
      renderPoule(g);
    }
    bindAvatarUploads(view);
    clampScoreInputs(view);
  }

  function showConfirm(message){
    return new Promise(resolve=>{
      const modal = document.createElement('div');
      modal.className = 'screenshot-modal';
      modal.innerHTML = `
        <div style="background:var(--panel); border-radius:12px; padding:22px; max-width:420px;" onclick="event.stopPropagation()">
          <p style="font-size:14px; color:var(--ink); margin:0 0 18px; line-height:1.5;">${escapeHtml(message)}</p>
          <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button class="action" id="confirmCancelBtn">Annuler</button>
            <button class="action gold" id="confirmOkBtn">Confirmer</button>
          </div>
        </div>`;
      const finish = (result)=>{ modal.remove(); resolve(result); };
      modal.onclick = (e)=>{ if(e.target===modal) finish(false); };
      document.body.appendChild(modal);
      modal.querySelector('#confirmOkBtn').onclick = ()=> finish(true);
      modal.querySelector('#confirmCancelBtn').onclick = ()=> finish(false);
    });
  }

  async function init(){
    view.innerHTML = '<div class="loading"><span class="loading-ball">⚽</span>Chargement du tournoi…</div>';
    await load();
    renderTabs();
    renderMiniStat();
    renderView();
    subscribeToLiveUpdates();
  }
  init();
})();
</script>

</body>
</html>
